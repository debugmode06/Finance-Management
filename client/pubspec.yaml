name: csea_finance
description: CSEA Finance Proposal Management System
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management & navigation
  get: ^4.6.6

  # Networking
  dio: ^5.4.3+1

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # Light preferences
  shared_preferences: ^2.2.3

  # File handling
  file_picker: ^8.0.3
  image_picker: ^1.1.2
  open_filex: ^4.5.0
  share_plus: ^9.0.0

  # UI / UX
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  percent_indicator: ^4.2.3

  # Socket.IO
  socket_io_client: ^2.0.3+1

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.0
  path_provider: ^2.1.3

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true


  assets:
    - assets/images/
    - assets/icons/
